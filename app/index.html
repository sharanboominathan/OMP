<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Once More Photography | Luxury Fine-Art Wedding Photography</title>
    <meta name="description" content="Award-winning fine-art wedding photography for discerning couples. 15 years, 400+ weddings across Europe and North America. Accepting just 12 weddings per year." />
    <meta name="keywords" content="luxury wedding photography, fine art wedding photographer, editorial wedding photos, destination wedding photographer, New York wedding photographer" />
    <meta name="author" content="Once More Photography" />
    <link rel="canonical" href="https://oncemorephotography.com/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://oncemorephotography.com/" />
    <meta property="og:title"       content="Once More Photography | Luxury Fine-Art Wedding Photography" />
    <meta property="og:description" content="Award-winning fine-art wedding photography. 15 years, 400+ weddings across Europe and North America." />
    <meta property="og:image"       content="https://oncemorephotography.com/images/gallery-5.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Once More Photography" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@oncemorephoto" />
    <meta name="twitter:title"       content="Once More Photography | Luxury Fine-Art Wedding Photography" />
    <meta name="twitter:description" content="Award-winning fine-art wedding photography. 15 years, 400+ weddings." />
    <meta name="twitter:image"       content="https://oncemorephotography.com/images/gallery-5.jpg" />

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Once More Photography",
      "description": "Award-winning fine-art wedding photography studio based in New York City.",
      "url": "https://oncemorephotography.com",
      "telephone": "+1-212-555-0147",
      "email": "hello@oncemore.studio",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "127 West 24th Street, Suite 4B",
        "addressLocality": "New York",
        "addressRegion": "NY",
        "postalCode": "10011",
        "addressCountry": "US"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 40.7472,
        "longitude": -74.0007
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
        "opens": "09:00",
        "closes": "18:00"
      },
      "priceRange": "$$$",
      "image": "https://oncemorephotography.com/images/gallery-1.jpg",
      "sameAs": [
        "https://www.instagram.com/oncemorephoto",
        "https://www.facebook.com/oncemorephoto"
      ]
    }
    </script>

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
